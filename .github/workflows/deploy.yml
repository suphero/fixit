name: Build & Deploy Docker Image

on:
  push:
    branches: [ "release", "master" ]

  pull_request:
    branches: [ "release", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Preset Image Name
      run: echo "IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$(echo ${{ github.sha }} | cut -c1-7) | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build and push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ env.IMAGE_URL }}
    - name: Debug Inputs
      run: |
        echo "Server: $CAPROVER_SERVER"
        echo "env.CAPROVER_SERVER: ${{ env.CAPROVER_SERVER }}"
        echo "vars.CAPROVER_SERVER: ${{ vars.CAPROVER_SERVER }}"
        echo "secrets.CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}"

        echo "App: $CAPROVER_APP_NAME"
        echo "env.CAPROVER_APP_NAME: ${{ env.CAPROVER_APP_NAME }}"
        echo "vars.CAPROVER_APP_NAME: ${{ vars.CAPROVER_APP_NAME }}"
        echo "secrets.CAPROVER_APP_NAME: ${{ secrets.CAPROVER_APP_NAME }}"

        echo "Token: $CAPROVER_APP_TOKEN"
        echo "env.CAPROVER_APP_TOKEN: ${{ env.CAPROVER_APP_TOKEN }}"
        echo "vars.CAPROVER_APP_TOKEN: ${{ vars.CAPROVER_APP_TOKEN }}"
        echo "secrets.CAPROVER_APP_TOKEN: ${{ secrets.CAPROVER_APP_TOKEN }}"

        echo "Image URL: ${{ env.IMAGE_URL }}"

    - name: Deploy Image to CapRrover
      uses: caprover/deploy-from-github@v1.1.2
      with:
        server: "${{ env.CAPROVER_SERVER }}"
        app: "${{ env.CAPROVER_APP_NAME }}"
        token: "${{ secrets.CAPROVER_APP_TOKEN }}"
        image: ${{ env.IMAGE_URL }}
